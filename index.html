<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Mario - Enhanced Graphics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #5c94fc 0%, #85b5ff 100%);
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: none;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        canvas {
            border: 4px solid #000;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 10px 25px;
            border-radius: 8px;
            border: 2px solid #fff;
        }
        .ui-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .ui-label { font-size: 10px; letter-spacing: 1px; margin-bottom: 2px; }
        .ui-value { font-size: 18px; color: #ffcc00; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 20;
        }
        .screen h1 {
            font-size: 56px; color: #e52521;
            text-shadow: 4px 4px 0 #fff, 8px 8px 0 #000;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .screen p { color: #fff; margin: 15px 0; text-align: center; font-size: 16px; text-shadow: 1px 1px 0 #000; }
        .screen button {
            background: linear-gradient(180deg, #e52521, #b81c19);
            border: 3px solid #fff; color: #fff; padding: 15px 50px;
            font-size: 20px; font-weight: bold; border-radius: 8px;
            cursor: pointer; box-shadow: 0 6px 0 #8b0000;
            transition: transform 0.1s; margin-top: 10px;
        }
        .screen button:hover { transform: translateY(-3px); }
        .screen button:active { transform: translateY(3px); }
        .hidden { display: none !important; }
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 30px;
            width: 100%;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 15;
        }
        .dpad, .actions { display: flex; gap: 15px; }
        .mbtn {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.25);
            border: 3px solid #fff;
            border-radius: 50%;
            color: #fff; font-size: 28px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
        }
        .mbtn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }
        @media (max-width: 850px) { #mobileControls { display: flex; } }

        #flashOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15; opacity: 0;
        }
    </style>
</head>
<body>
    <div id="gameContainer">

// Coin (16x16) - 4 frame spin
function genCoinFrames() {
    const frames = [];
    for (let f = 0; f < 4; f++) {
        const w = Math.max(2, 6 - f * 1.5);
        const pixels = [];
        for (let y = 0; y < 16; y++) {
            pixels[y] = [];
            for (let x = 0; x < 16; x++) {
                const dx = x - 8, dy = y - 8;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist <= w && dist >= w - 1.8) pixels[y][x] = x < 8 ? 'Y' : 'y';
                else pixels[y][x] = ' ';
            }
        }
        frames.push(createPixelSprite(16, 16, pixels, P));
    }
    return frames;
}
sprites.coin = genCoinFrames();

    cx.beginPath(); cx.moveTo(0,64); cx.lineTo(64,8); cx.lineTo(128,64); cx.fill();

// ===== AUDIO SYSTEM =====
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSound(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = (f, t, d, v = 0.15) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g);
        g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(f, now);
        o.type = t;
        g.gain.setValueAtTime(v, now);
        g.gain.exponentialRampToValueAtTime(0.01, now + d);
        o.start(now);
        o.stop(now + d);
    };
    if (type === 'jump') { osc(150, 'square', 0.12); osc(200, 'sine', 0.1, 0.08); }
    if (type === 'coin') { osc(988, 'sine', 0.15); setTimeout(() => osc(1319, 'sine', 0.2), 80); }
    if (type === 'stomp') { osc(180, 'sawtooth', 0.15, 0.2); osc(120, 'square', 0.1, 0.1); }
    if (type === 'powerup') { [440, 554, 698, 880].forEach((f, i) => setTimeout(() => osc(f, 'sine', 0.15, 0.12), i * 70)); }
    if (type === 'die') { osc(400, 'sawtooth', 0.2, 0.2); setTimeout(() => osc(300, 'sawtooth', 0.2, 0.2), 150); setTimeout(() => osc(200, 'sawtooth', 0.3, 0.2), 300); }
    if (type === 'win') { [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => osc(f, 'square', 0.3, 0.15), i * 120)); }
    if (type === 'bump') { osc(100, 'square', 0.08, 0.15); }
    if (type === 'break') { osc(80, 'sawtooth', 0.1, 0.2); osc(60, 'square', 0.15, 0.15); }
}

// ===== ANIMATION SYSTEM =====
class Animator {
    constructor(frames, frameRate = 8) {
        this.frames = Array.isArray(frames) ? frames : [frames];
        this.frameRate = frameRate;
        this.frameIndex = 0; this.timer = 0; this.flip = false;
    }
    update(dt) {
        this.timer += dt;
        if (this.timer >= 1000 / this.frameRate) {
            this.frameIndex = (this.frameIndex + 1) % this.frames.length;
            this.timer = 0;
        }
    }
   draw(ctx, x, y, scale = 2) {
        const frame = this.frames[this.frameIndex];
        if (!frame) return;
        const w = frame.width * scale, h = frame.height * scale;
        ctx.save();
        if (this.flip) { ctx.translate(x + w, y); ctx.scale(-1, 1); ctx.drawImage(frame, 0, 0, w, h); }
        else { ctx.drawImage(frame, x, y, w, h); }
        ctx.restore();
    }
}

// ===== PARTICLE SYSTEM =====
class Particle {
    constructor(type, x, y, vx, vy, opts = {}) {
        this.type = type; this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.life = opts.life || 30; this.maxLife = this.life;
        this.size = opts.size || 4;
        this.rotation = opts.rotation || 0; this.rotationSpeed = opts.rotationSpeed || 0;
        this.color = opts.color || '#ffffff';
        this.text = opts.text || null; this.fontSize = opts.fontSize || 20;
    }
    update() {
        this.x += this.vx; this.y += this.vy; this.vy += 0.2;
        this.life--; this.rotation += this.rotationSpeed;
        this.alpha = this.life / this.maxLife;
    }
    draw(ctx, cameraX) {
        ctx.save(); ctx.globalAlpha = this.alpha;
        if (this.type === 'sparkle') this.drawSparkle(ctx, cameraX);
        else if (this.type === 'dust') this.drawDust(ctx, cameraX);
        else if (this.type === 'debris') this.drawDebris(ctx, cameraX);
        else if (this.type === 'score') this.drawScore(ctx, cameraX);
        ctx.restore();
    }
    drawSparkle(ctx, cameraX) {
        ctx.translate(this.x - cameraX, this.y); ctx.rotate(this.rotation);
        ctx.beginPath(); const s = this.size;
        for (let i = 0; i < 4; i++) {
            const a = (i/4)*Math.PI*2, oa = a + Math.PI/4;
            if (i===0) ctx.moveTo(Math.cos(a)*s, Math.sin(a)*s);
            else ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
            ctx.lineTo(Math.cos(oa)*s*0.5, Math.sin(oa)*s*0.5);
        }
        ctx.closePath(); ctx.fillStyle = this.color; ctx.fill();
    }
    drawDust(ctx, cameraX) {
        ctx.beginPath(); ctx.arc(this.x - cameraX, this.y, this.size, 0, Math.PI*2);
        ctx.fillStyle = this.color; ctx.fill();
    }
    drawDebris(ctx, cameraX) {
        ctx.save(); ctx.translate(this.x - cameraX, this.y); ctx.rotate(this.rotation);
        ctx.fillStyle = this.color; ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        ctx.restore();
    }
    drawScore(ctx, cameraX) {
        ctx.font = `bold ${this.fontSize}px Arial`;
        ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.strokeText(this.text, this.x - cameraX, this.y);
        ctx.fillText(this.text, this.x - cameraX, this.y);
    }
}

let particles = [];
function createParticles(type, x, y, count, opts = {}) {
    for (let i = 0; i < count; i++) {
        const a = Math.random()*Math.PI*2, sp = 2+Math.random()*4;
        particles.push(new Particle(type, x, y, Math.cos(a)*sp, Math.sin(a)*sp-2, opts));
    }
}

// ===== SCREEN SHAKE & EFFECTS =====
let shake = { mag: 0, dur: 0, frame: 0 };
let hitStop = 0;
let flashAlpha = 0;

function triggerShake(mag, dur) { shake = { mag, dur, frame: 0 }; }
function triggerHitStop(frames) { hitStop = frames; }
function triggerFlash(color, alpha, duration) {
    flashAlpha = alpha; flashCtx.fillStyle = color;
    setTimeout(() => { flashAlpha = 0; }, duration);
}

// ===== GAME STATE =====
let gameState = 'start', score = 0, coinCount = 0, lives = 3, cameraX = 0;
let mario, platforms, enemies, coins, blocks, flag;
let audioCtx = null;
let jumpBufferTimer = 0, coyoteTimer = 0;
let marioScaleX = 1, marioScaleY = 1;
let marioAnim, goombaAnims;

function initMario() {
    mario = {
        x: 100, y: 300, vx: 0, vy: 0, w: 32, h: 32,
        speed: 5, maxSpeed: 6, jumpForce: -14, grounded: false,
        facing: 1, big: false, invincible: 0
    };
    marioAnim = new Animator([sprites.marioIdle, sprites.marioWalk1, sprites.marioWalk2, sprites.marioJump], 8);
}

function generateLevel() {
    platforms = []; enemies = []; coins = []; blocks = [];
    // Ground
    for (let i = 0; i < 3000; i += 40) {
        if (i < 500 || (i > 600 && i < 1000) || (i > 1100 && i < 1500) || i > 1600)
            platforms.push({ x: i, y: 400, w: 40, h: 50, sprite: sprites.ground });
    }
    // Platforms
    [[350,280,100],[550,200,80],[800,260,120],[1100,180,100],[1400,280,80],[1700,200,150],[2100,240,100],[2400,180,120]].forEach(([x,y,w]) => {
        platforms.push({ x, y, w, h: 24, sprite: sprites.brick });
    });
    // Blocks
    [[400,260,'coin'],[750,240,'mushroom'],[1150,220,'coin'],[1750,240,'coin'],[2450,220,'mushroom']].forEach(([x,y,c]) => {
        blocks.push({ x, y, w: 32, h: 32, hit: false, content: c });
    });
    // Coins
    [450,570,820,1120,1420,1720,2120,2420,2700].forEach(x => {
        coins.push({ x, y: 160, w: 32, h: 32, collected: false, bob: Math.random()*Math.PI*2 });
    });
    // Enemies
    [500,850,1200,1550,1900,2250,2600].forEach(x => {
        enemies.push({ x, y: 368, w: 32, h: 32, vx: -1.5, alive: true, type: 'goomba' });
    });
    goombaAnims = enemies.map(() => new Animator([sprites.goomba1, sprites.goomba2], 6));
    // Flag
    flag = { x: 2800, y: 180 };
}

// ===== INPUT =====
const keys = { left: false, right: false, jump: false };
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === 'z') {
        keys.jump = true;

        jumpBufferTimer = 80;
        if (gameState === 'start') startGame();
    }
    if (e.key === 'p' || e.key === 'P') togglePause();
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === 'z') keys.jump = false;
});

// ===== PHYSICS =====
function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

let levelLength = 2800;

function updateMario() {
    let wasGrounded = mario.grounded;
    if (jumpBufferTimer > 0) jumpBufferTimer--;
    if (coyoteTimer > 0) coyoteTimer--;

    // Input
    if (keys.left) { mario.facing = -1; }
    if (keys.right) { mario.facing = 1; }
    const targetVx = (keys.left ? -1 : keys.right ? 1 : 0) * mario.maxSpeed;
    mario.vx += (targetVx - mario.vx) * mario.speed * 0.15;
    if (!keys.left && !keys.right) mario.vx *= 0.82;
    mario.vx = Math.max(-mario.maxSpeed, Math.min(mario.maxSpeed, mario.vx));

    // Gravity
    mario.vy += 0.6;
    mario.x += mario.vx; mario.y += mario.vy;

    // Platform collision
    mario.grounded = false;
    platforms.forEach(p => {
        if (rectCollide(mario, p)) {
            if (mario.vy > 0 && mario.y + mario.h - mario.vy <= p.y + 5) {
                mario.y = p.y - mario.h; mario.vy = 0; mario.grounded = true;
            } else if (mario.vy < 0 && mario.y - mario.vy >= p.y + p.h - 5) {
                mario.y = p.y + p.h; mario.vy = 0; playSound('bump');
            } else if (mario.vx > 0) mario.x = p.x - p.w;
            else if (mario.vx < 0) mario.x = p.x + p.w;
            mario.vx = 0;
        }
    });

    // Coyote time
    if (wasGrounded && !mario.grounded) {
        coyoteTimer = 100;
    }

    // Jump with buffer
    if (jumpBufferTimer > 0 && (mario.grounded || coyoteTimer > 0)) {
        mario.vy = mario.jumpForce;
        mario.grounded = false;
        jumpBufferTimer = 0;
        createParticles('dust', mario.x + 16, mario.y + mario.h, 5, {color:'#fff'});
        playSound('jump');
    }

    // Block collision
    blocks.forEach(b => {
        if (rectCollide(mario, b)) {
            if (mario.vy < 0 && mario.y - mario.vy >= b.y + b.h - 5 && !b.hit) {
                b.hit = true; mario.vy = 0; playSound('bump');
                if (b.content === 'coin') { score += 200; coinCount++; playSound('coin'); createParticles('sparkle', b.x+16, b.y, 8, {color:'#ffd700'}); triggerShake(3,10); }
                else if (b.content === 'mushroom') { score += 1000; mario.big = true; marioScaleX = 1.5; marioScaleY = 1.5; playSound('powerup'); createParticles('sparkle', b.x+16, b.y, 15, {color:'#ffd700'}); triggerFlash('rgba(255,255,255,0.4)', 0.4, 200); }
                else if (b.content === 'star') { score += 2000; mario.invincible = 600; playSound('powerup'); triggerFlash('rgba(255,255,255,0.4)', 0.4, 200); }
                triggerHitStop(6);
            }
        }
    });

    // Bounds
    if (mario.x < 0) mario.x = 0;
    if (mario.y > 450) die();

    // Invincibility
    if (mario.invincible > 0) mario.invincible--;

    // Camera
    const targetCamX = Math.max(0, Math.min(mario.x - 300, levelLength - 800));
    cameraX += (targetCamX - cameraX) * 0.1;

    // Animation
    let frame = 0;
    if (!mario.grounded) frame = 3;
    else if (Math.abs(mario.vx) > 0.5) frame = 1 + (Date.now() % 400 < 200 ? 1 : 0);
    marioAnim.frameIndex = frame;
    marioAnim.flip = mario.facing < 0;
}

function updateEnemies() {
    enemies.forEach((e, i) => {
        if (!e.alive) return;
        e.x += e.vx;
        platforms.forEach(p => {
            if (e.x < p.x + p.w - 5 && e.x + e.w > p.x + 5 && e.y + e.h >= p.y && e.y + e.h <= p.y + 10) {
                e.vx *= -1;
            }
        });
        
        // Mario collision
        if (rectCollide(mario, e)) {
            if (mario.vy > 0 && mario.y + mario.h - mario.vy <= e.y + 10) {
                e.alive = false; score += 100; playSound('stomp');
                createParticles('dust', e.x+16, e.y+16, 6, {color:'#888'});
                createParticles('debris', e.x+16, e.y+16, 4, {color:'#c84c0c'});
                mario.vy = -8; triggerShake(3, 10); triggerHitStop(6);
            } else if (mario.invincible <= 0) {
                die();
            }
        }
    });
}

function updateCoins() {
    coins.forEach(c => {
        if (c.collected) return;
        c.bob += 0.1;
        if (rectCollide(mario, c)) {
            c.collected = true; score += 200; coinCount++; playSound('coin');
            createParticles('sparkle', c.x+16, c.y+16, 8, {color:'#ffd700'});
            particles.push(new Particle('score', c.x+16, c.y, 0, -2, {text:'+200', life:40}));
        }
    });
}

function die() {
    lives--;

        playSound('die');
        createParticles('debris', mario.x+16, mario.y+16, 12, {color:'#e52521'});
    triggerFlash('rgba(255,0,0,0.4)', 0.4, 300);
    if (lives <= 0) {
        gameState = 'gameover';
        document.getElementById('finalScore').textContent = score;
        document.getElementById('gameOverScreen').classList.remove('hidden');
    } else {
        mario.x = 100; mario.y = 300; mario.vx = 0; mario.vy = 0;
        mario.invincible = 120;
    }
}

function checkWin() {
    if (mario.x >= flag.x) {
        gameState = 'win';
        score += 5000;

                playSound('win');
                document.getElementById('winScore').textContent = score;
        document.getElementById('winScreen').classList.remove('hidden');
        triggerFlash('rgba(255,255,255,0.3)', 0.3, 500);
    }
}

function updateParticles() {
    particles = particles.filter(p => { p.update(); return p.life > 0; });
}

// ===== RENDER =====
function draw() {
    // Sky gradient
    const grad = ctx.createLinearGradient(0,0,0,450);
    grad.addColorStop(0, P.skyLight); grad.addColorStop(1, P.sky);
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 800, 450);
    
    ctx.save();
    // Screen shake
    if (shake.frame < shake.dur) {
        const prog = shake.frame / shake.dur;
        const mag = shake.mag * (1 - prog);
        ctx.translate((Math.random()-0.5)*mag*2, (Math.random()-0.5)*mag*2);
        shake.frame++;
    }
    
    ctx.translate(-cameraX, 0);
    
    // Background (parallax)
    ctx.drawImage(sprites.cloud, 100 - cameraX*0.3, 80);
    ctx.drawImage(sprites.cloud, 400 - cameraX*0.3, 50);
    ctx.drawImage(sprites.cloud, 700 - cameraX*0.3, 90);
    ctx.drawImage(sprites.hill, 200 - cameraX*0.5, 350);
    ctx.drawImage(sprites.hill, 600 - cameraX*0.5, 350);
    
    // Platforms
    platforms.forEach(p => ctx.drawImage(p.sprite, p.x, p.y, p.w, p.h));
    
    // Blocks
    blocks.forEach(b => ctx.drawImage(b.hit ? sprites.questionBlockHit : sprites.questionBlock, b.x, b.y));
    
    // Coins
    coins.forEach(c => {
        if (!c.collected) {
            const frame = sprites.coin[Math.floor(c.bob * 2) % 4];
            if (frame) ctx.drawImage(frame, c.x, c.y + Math.sin(c.bob)*4, 32, 32);
        }
    });
    
    // Enemies
    enemies.forEach((e, i) => {
        if (e.alive && goombaAnims[i]) {
            goombaAnims[i].update(16);
            goombaAnims[i].draw(ctx, e.x, e.y, 2);
        }
    });
    
    // Flag
    ctx.fillStyle = '#fff'; ctx.fillRect(flag.x, flag.y, 4, 120);
    const flagFrame = Date.now() % 600 < 300 ? sprites.flag1 : sprites.flag2;
    if (flagFrame) ctx.drawImage(flagFrame, flag.x+4, flag.y+10);
    
    // Mario
    if (mario.invincible <= 0 || Math.floor(Date.now() / 50) % 2 === 0) {
        marioAnim.draw(ctx, mario.x, mario.y, 2);
    }
    
    // Particles
    particles.forEach(p => p.draw(ctx, cameraX));
    
    ctx.restore();
    
    // Flash overlay
    if (flashAlpha > 0) {
        flashCtx.fillStyle = flashCtx.fillStyle.replace(/[\d.]+\)$/, flashAlpha + ')');
        flashCtx.fillRect(0, 0, 800, 450);
    } else {
        flashCtx.clearRect(0, 0, 800, 450);
    }
    
    // UI update
    document.getElementById('score').textContent = String(score).padStart(6, '0');
    document.getElementById('coins').textContent = String(coinCount).padStart(2, '0');
    document.getElementById('lives').textContent = lives;
}

// ===== GAME LOOP =====
let lastTime = 0;
function gameLoop(time) {
    if (gameState !== 'playing') { requestAnimationFrame(gameLoop); return; }
    
    const dt = time - lastTime; lastTime = time;
    
    if (hitStop > 0) { hitStop--; draw(); requestAnimationFrame(gameLoop); return; }
    
    updateMario(); updateEnemies(); updateCoins(); updateParticles();
    checkWin();
    draw();
    requestAnimationFrame(gameLoop);
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('winScreen').classList.add('hidden');
    gameState = 'playing'; score = 0; coinCount = 0; lives = 3;
    initMario();

    initAudio(); generateLevel(); particles = [];
    lastTime = performance.now(); requestAnimationFrame(gameLoop);
}

function togglePause() {
    if (gameState === 'playing') {
        gameState = 'paused';
        document.getElementById('pauseOverlay').classList.remove('hidden');
    } else if (gameState === 'paused') {
        gameState = 'playing';
        document.getElementById('pauseOverlay').classList.add('hidden');
        lastTime = performance.now(); requestAnimationFrame(gameLoop);
    }
}

// Initial draw
const grad = ctx.createLinearGradient(0,0,0,450);
grad.addColorStop(0, P.skyLight); grad.addColorStop(1, P.sky);
ctx.fillStyle = grad; ctx.fillRect(0, 0, 800, 450);
</script>
